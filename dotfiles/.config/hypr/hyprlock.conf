# BACKGROUND
background {
  monitor = 
  path = ~/Pictures/walls/walls19.png
  blur_passes = 2
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

# GENERAL
general {}

# Clock
label {
  monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(133, 177, 247, 0.70)
    font_size = 90
    font_family = JetBrains Mono NF Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A,%d %B")"
    color = rgba(192, 202, 246, 0.70)
    font_size = 40
    font_family = JetBrains Mono NF Bold
    position = 0, 250
    halign = center
    valign = center
}

# Profile-Pic
image {
    monitor =
    path = ~/Pictures/beungeut.png
    border_size = 2
    border_color = rgba(133, 177, 247, 0)
    size = 170
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(192, 202, 246, .1)
    rounding = -1
    border_size = 0
    border_color = rgba(192, 202, 246, 0)
    rotate = 0
    xray = false 

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = rgba(247, 118, 142, 0.80)
    font_size = 18
    font_family = JetBrains Mono NF Bold
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # 0.2 - 0.8
    dots_spacing = 0.2 # 0.0 - 1.0
    dots_center = true
    outer_color = rgba(192, 202, 246, 0)
    inner_color = rgba(192, 202, 246, 0.1)
    font_color = rgb(192, 202, 246)
    fade_on_empty = false
    font_family = JetBrains Mono NF Bold
    placeholder_text = <i><span foreground="##c0caf699">Password</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

