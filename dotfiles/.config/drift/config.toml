# Generated by: drift config --init || edited
# Full documentation: https://github.com/phlx0/drift

[engine]
fps           = 60     
cycle_seconds = 60     # 0 = stay on one scene
scenes        = "rain,waveform,pipes,clock" 
theme         = "cosmic" 
shuffle       = false 
hide_tmux_status = false  # tmux: hide status bar while displaying scene

[scene.rain]
charset = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ0123456789"
density = 0.7
speed   = 1.0

[scene.waveform]
layers    = 3
amplitude = 0.70
speed     = 1.0

[scene.pipes]
heads         = 6
turn_chance   = 0.15  
speed         = 1.0
reset_seconds = 45.0  

[scene.clock]
show_date = true  

